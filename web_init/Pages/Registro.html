<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="/CSS3/styleIndex.css">
    <title>Planificash</title>
</head>

<body>

    <div class="container-fluid d-flex justify-content-center align-items-center vh-100 ">
        <div class="row justify-content-center">
            <div class="col-6 shadow p-3 mb-5 bg-body rounded" id="cardDatos">
                <div class="d-flex flex-column flex-sm-row align-items-center">
                    <img src="/Iconos/Icono app.jpg " alt="Icono_app" class="img-fluid w-25"
                        style="border-radius: 50%;">
                    <H1>Planifica$h</H1>
                </div>

                <form class="needs-validation" novalidate id="formRegistro">
                    <div class="mb-3">
                        <label for="nombres" class="form-label">Nombres</label>
                        <input type="text" class="form-control" id="nombres" placeholder="Nombres" required>
                        <div class="invalid-feedback"> Por favor ingresa un nombre válido.</div>
                    </div>

                    <div class="mb-3">
                        <label for="apellidos" class="form-label">Apellidos</label>
                        <input type="text" class="form-control" id="apellidos" placeholder="Apellidos" required>
                        <div class="invalid-feedback">Por favor ingresa un Apellido válido.</div>
                    </div>

                    <div class="mb-3">
                        <label for="correoRegistro" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="correoRegistro" placeholder="nombre@ejemplo.com" required>
                        <div class="invalid-feedback">Ingrese un correo Valido</div>
                    </div>

                    <div>
                        <label for="clave" class="form-label">Contraseña</label>
                        <input type="password" id="clave" class="form-control" required minlength="8" maxlength="20">
                        <div class="invalid-feedback">La contraseña debe tener entre 8 y 20 caracteres.</div>
                    </div>

                    <div>
                        <label for="claveValidate" class="form-label">Confirmar Contraseña</label>
                        <input type="password" id="claveValidate" class="form-control" required minlength="8" maxlength="20">
                        <div class="invalid-feedback">La contraseña debe tener entre 8 y 20 caracteres.</div>
                    </div>

                    <div class="d-flex justify-content-center mt-3">
                        <button type="submit" class="btn btn-primary"> Registrarme</button>
                    </div>
                    <p class="d-flex justify-content-center mt-3 mb-0"> Ya tienes una cuenta ?</p>
                    <div class="d-flex justify-content-center mt-0" id="registroIndex">
                    <a class="link-primary" href="/Index.html"> Iniciar Sesión </a>
                </div>

                </form>
            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <script type="module" src="/JavaScript/Registro.js"></script>
</body>

</html>
